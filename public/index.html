<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitCanchas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="sidebar">
        <h2>⚽ FitCanchas</h2>
        <button class="menu-btn active" onclick="mostrarModulo('reservar')"><i class="fas fa-calendar-check"></i> Reservar</button>
        <button class="menu-btn" onclick="mostrarModulo('inventario')"><i class="fas fa-boxes"></i> Inventario</button>
    </div>

    <div class="main-content">
        
        <div id="modulo-reservar" class="modulo activo">
            <h2>Nueva Reserva</h2>
            <form id="form-reserva">
                <label>Nombre del Cliente:</label>
                <input type="text" id="nombre" required>

                <div class="fila-form">
                    <div>
                        <label>Tipo de Cancha:</label>
                        <select id="tipo-cancha" onchange="calcularTotal()">
                            <option value="11v11" data-precio="100000">Completa (11 vs 11) - $100.000</option>
                            <option value="11v11_promo" data-precio="110000">⭐ Completa PROMOCIÓN (x24 agua) - $110.000</option>
                            <option value="7v7" data-precio="60000">Fútbol 7 (7 vs 7) - $60.000</option>
                            <option value="7v7_promo" data-precio="70000">⭐ Fútbol 7 PROMOCIÓN (x14 agua) - $70.000</option>
                        </select>
                    </div>
                    <div>
                        <label>Método de Pago:</label>
                        <select id="metodo-pago" required>
                            <option value="efectivo">💵 Efectivo</option>
                            <option value="transferencia">📱 Transferencia (Nequi/Bancolombia)</option>
                            <option value="tarjeta">💳 Tarjeta (Datáfono)</option>
                        </select>
                    </div>
                </div>

                <div class="fila-form">
                    <div>
                        <label>Fecha:</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div>
                        <label>Horario Predeterminado:</label>
                        <select id="hora" required>
                            <option value="18:00:00">06:00 PM - 07:00 PM</option>
                            <option value="19:00:00">07:00 PM - 08:00 PM</option>
                            <option value="20:00:00">08:00 PM - 09:00 PM</option>
                            <option value="21:00:00">09:00 PM - 10:00 PM</option>
                        </select>
                    </div>
                </div>

                <h3>Implementos</h3>
                <div class="fila-form">
                    <div>
                        <label>Balones:</label>
                        <input type="number" id="balones" value="1" min="0" max="20">
                    </div>
                    <div>
                        <label>Petos Rojos:</label>
                        <input type="number" id="petos_rojos" value="11" min="0">
                    </div>
                    <div>
                        <label>Petos Azules:</label>
                        <input type="number" id="petos_azules" value="11" min="0">
                    </div>
                </div>

                <div class="facturacion-box" style="background-color: #f8f9fa; padding: 20px; border-radius: 8px; margin-top: 25px; border-left: 5px solid #008080; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s;">
                    <h3 style="margin-top: 0; color: #333; border-bottom: 2px solid #ddd; padding-bottom: 10px;"><i class="fas fa-receipt"></i> Resumen de la Reserva</h3>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.1em;">
                        <span>Cancha seleccionada:</span>
                        <span id="factura-cancha-precio" style="font-weight: bold;">$0</span>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; color: #666; font-size: 0.9em;">
                        <span>Implementos base incluidos:</span>
                        <span style="color: #28a745; font-weight: bold;">Gratis</span>
                    </div>

                    <div id="seccion-extras" style="display: none; background-color: #fff3cd; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 3px solid #ffc107;">
                        <div style="display: flex; justify-content: space-between; color: #856404;">
                            <span><strong>Cobro por Extras:</strong> (Balones o Petos Adicionales)</span>
                            <span id="factura-extras-precio" style="font-weight: bold;">$0</span>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 2px dashed #ccc; font-weight: bold; font-size: 1.4em;">
                        <span>Total a Pagar:</span>
                        <span id="factura-total" style="color: #008080;">$0</span>
                    </div>

                    <button type="submit" class="btn-guardar" style="width: 100%; margin-top: 20px; font-size: 1.1em; padding: 12px;"><i class="fas fa-check-circle"></i> Confirmar Reserva</button>
                </div>
            </form>
        </div>

        <div id="modulo-inventario" class="modulo" style="display: none;">
            <h2>Control de Inventario y Canchas</h2>
            <button onclick="cargarInventario()" class="btn-actualizar"><i class="fas fa-sync-alt"></i> Actualizar Datos</button>
            
            <h3 style="margin: 20px 0 10px 0; color: #008080;"><i class="fas fa-box-open"></i> Artículos</h3>
            <div id="lista-inventario" class="grid-inventario"></div>

            <h3 style="margin: 30px 0 10px 0; color: #008080;"><i class="fas fa-futbol"></i> Estado de las Canchas</h3>
            <div id="lista-canchas" class="grid-inventario"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
