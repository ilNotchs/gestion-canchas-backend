<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitCanchas - Premium Booking</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h1 class="logo-texto">FIT<span>CANCHAS</span></h1>
        </div>
        
        <div id="menu-opciones">
            <button class="menu-btn" onclick="mostrarModulo('dashboard')"><i class="fas fa-chart-line"></i> <span>Dashboard</span></button>
            <button class="menu-btn" onclick="mostrarModulo('reservar')"><i class="fas fa-calendar-plus"></i> <span>Reservar</span></button>
            <button class="menu-btn" onclick="mostrarModulo('inventario')"><i class="fas fa-boxes"></i> <span>Inventario</span></button>
        </div>
        
        <button onclick="cerrarSesion()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> <span>Salir</span></button>
    </div>

    <div class="main-content">
        
        <div id="modulo-reservar" class="modulo">
            <div class="header-modulo">
                <h2><i class="fas fa-calendar-check"></i> Nueva Reserva</h2>
                <p>Completa los datos para asegurar la cancha.</p>
            </div>

            <form id="form-reserva" class="form-premium">
                <div class="input-group">
                    <label>Nombre del Cliente</label>
                    <input type="text" id="nombre" placeholder="Nombre completo del cliente" required>
                </div>

                <div class="fila-form">
                    <div class="input-group">
                        <label>Cancha y Promoción</label>
                        <select id="tipo-cancha" onchange="calcularTotal()">
                            <option value="11v11" data-precio="100000">Cancha Completa (11v11) - $100.000</option>
                            <option value="11v11_promo" data-precio="110000">⭐ PROMO 11v11 (+24 Aguas) - $110.000</option>
                            <option value="7v7" data-precio="60000">Cancha Fútbol 7 (7v7) - $60.000</option>
                            <option value="7v7_promo" data-precio="70000">⭐ PROMO 7v7 (+14 Aguas) - $70.000</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Fecha del Evento</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div class="input-group">
                        <label>Hora</label>
                        <select id="hora" required>
                            <option value="18:00:00">06:00 PM</option>
                            <option value="19:00:00">07:00 PM</option>
                            <option value="20:00:00">08:00 PM</option>
                            <option value="21:00:00">09:00 PM</option>
                        </select>
                    </div>
                </div>

                <div class="seccion-implementos">
                    <h3>Implementos Adicionales</h3>
                    <div class="fila-form">
                        <div class="input-group">
                            <label>Balones</label>
                            <input type="number" id="balones" value="1" min="0">
                        </div>
                        <div class="input-group">
                            <label>Petos Rojos</label>
                            <input type="number" id="petos_rojos" value="11" min="0">
                        </div>
                        <div class="input-group">
                            <label>Petos Azules</label>
                            <input type="number" id="petos_azules" value="11" min="0">
                        </div>
                    </div>
                </div>

                <div class="facturacion-box" id="recibo-imprimible">
                    <div id="logo-recibo" style="display:none; text-align:center;"><h2>FIT CANCHAS</h2><hr></div>
                    <div class="resumen-pago">
                        <div class="total-label">Total a Pagar</div>
                        <div id="factura-total" class="total-monto">$0</div>
                    </div>
                    <div class="acciones-form">
                        <button type="button" onclick="descargarPDF()" class="btn-pdf-minimal"><i class="fas fa-file-pdf"></i> PDF</button>
                        <button type="submit" class="btn-confirmar-pro">Confirmar Reserva</button>
                    </div>
                </div>
            </form>
        </div>

        <div id="modulo-dashboard" class="modulo">...</div>
        <div id="modulo-inventario" class="modulo">...</div>

    </div>

    <script src="app.js"></script>
</body>
</html>
