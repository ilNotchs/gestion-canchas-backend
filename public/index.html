<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitCanchas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <h2>⚽ FitCanchas</h2>
        <button class="menu-btn active" onclick="mostrarModulo('reservar')">📅 Reservar</button>
        <button class="menu-btn" onclick="mostrarModulo('inventario')">📦 Inventario</button>
    </div>

    <div class="main-content">
        
        <div id="modulo-reservar" class="modulo activo">
            <h2>Nueva Reserva</h2>
            <form id="form-reserva">
                <label>Nombre del Cliente:</label>
                <input type="text" id="nombre" required>

                <div class="fila-form">
                    <div>
                        <label>Tipo de Cancha:</label>
                        <select id="tipo-cancha" onchange="calcularTotal()">
                            <option value="11v11" data-precio="100000">Completa (11 vs 11) - $100.000</option>
                            <option value="11v11_promo" data-precio="110000">⭐ Completa PROMOCIÓN (x24 agua) - $110.000</option>
                            <option value="7v7" data-precio="60000">Fútbol 7 (7 vs 7) - $60.000</option>
                            <option value="7v7_promo" data-precio="70000">⭐ Fútbol 7 PROMOCIÓN (x14 agua) - $70.000</option>
                        </select>
                    </div>
                    <div>
                        <label>Método de Pago:</label>
                        <select id="metodo-pago" required>
                            <option value="efectivo">💵 Efectivo</option>
                            <option value="transferencia">📱 Transferencia (Nequi/Bancolombia)</option>
                            <option value="tarjeta">💳 Tarjeta (Datáfono)</option>
                        </select>
                    </div>
                </div>

                <div class="fila-form">
                    <div>
                        <label>Fecha:</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div>
                        <label>Horario Predeterminado:</label>
                        <select id="hora" required>
                            <option value="18:00:00">06:00 PM - 07:00 PM</option>
                            <option value="19:00:00">07:00 PM - 08:00 PM</option>
                            <option value="20:00:00">08:00 PM - 09:00 PM</option>
                            <option value="21:00:00">09:00 PM - 10:00 PM</option>
                        </select>
                    </div>
                </div>

                <h3>Implementos</h3>
                <div class="fila-form">
                    <div>
                        <label>Balones:</label>
                        <input type="number" id="balones" value="1" min="0" max="20">
                    </div>
                    <div>
                        <label>Petos Rojos:</label>
                        <input type="number" id="petos_rojos" value="11" min="0">
                    </div>
                    <div>
                        <label>Petos Azules:</label>
                        <input type="number" id="petos_azules" value="11" min="0">
                    </div>
                </div>

                <div class="resumen">
                    <h3>Total a Pagar: <span id="total-precio">$100,000</span></h3>
                    <button type="submit" class="btn-guardar">Confirmar Reserva</button>
                </div>
            </form>
        </div>

        <div id="modulo-inventario" class="modulo" style="display: none;">
            <h2>Control de Inventario y Canchas</h2>
            <button onclick="cargarInventario()" class="btn-actualizar">🔄 Actualizar Datos</button>
            
            <h3 style="margin: 20px 0 10px 0; color: #008080;">📦 Artículos</h3>
            <div id="lista-inventario" class="grid-inventario"></div>

            <h3 style="margin: 30px 0 10px 0; color: #008080;">⚽ Estado de las Canchas</h3>
            <div id="lista-canchas" class="grid-inventario"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
